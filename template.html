<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{TITLE}}</title>
  <style>
    :root {
      --bg: #0b0c10;
      --panel: #11131a;
      --panel2: #0f1117;
      --text: #e8e8ea;
      --muted: #a7a7b0;
      --border: rgba(255,255,255,0.08);
      --accent: #7aa2ff;
      --good: #2ecc71;
      --bad: #e74c3c;
    }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans", "Helvetica Neue", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(11,12,16,0.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 14px 16px;
    }
    .title {
      font-size: 18px;
      font-weight: 650;
      margin: 0 0 10px 0;
    }
    .controls {
      display: grid;
      grid-template-columns: 220px repeat(var(--exp-cols), 160px) 1fr;
      gap: 10px;
      align-items: end;
    }
    .control { display: flex; flex-direction: column; gap: 6px; }
    label { font-size: 12px; color: var(--muted); }
    select, input[type="text"] {
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 10px;
      outline: none;
    }
    input[type="text"]::placeholder { color: rgba(231,231,234,0.45); }

    .row {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .leftrow { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .btn {
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      cursor: pointer;
    }
    .btn:hover { border-color: rgba(255,255,255,0.18); }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--panel2);
      color: var(--muted);
      font-size: 12px;
    }

    .cards { padding: 16px; }
    .card {
      max-width: 1200px;
      margin: 0 auto 14px auto;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(17,19,26,0.96), rgba(15,17,23,0.96));
      overflow: hidden;
    }
    .card-inner {
      display: grid;
      grid-template-columns: 420px 1fr;
      gap: 0;
    }
    .video {
      border-right: 1px solid var(--border);
      background: #000;
      min-height: 240px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    video {
      width: 100%;
      height: 100%;
      max-height: 320px;
      object-fit: contain;
      background: #000;
    }
    .v-placeholder {
      padding: 14px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }
    .content { padding: 14px 16px; }
    .meta {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .meta strong { color: var(--text); font-weight: 650; }
    .muted { color: var(--muted); }
    .question { font-size: 14px; line-height: 1.45; margin: 8px 0 10px 0; }
    .options { margin: 8px 0 10px 0; padding: 0; list-style: none; }
    .options li {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 10px;
      margin-bottom: 8px;
      background: rgba(255,255,255,0.02);
      font-size: 13px;
      line-height: 1.35;
    }
    .options li.correct {
      border-color: rgba(46, 204, 113, 0.45);
      box-shadow: 0 0 0 1px rgba(46, 204, 113, 0.15) inset;
    }
    .badges { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
    .badge {
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      color: var(--muted);
      background: rgba(255,255,255,0.02);
    }
    .badge.good { border-color: rgba(46,204,113,0.35); color: rgba(46,204,113,0.95); }
    .badge.bad { border-color: rgba(231,76,60,0.35); color: rgba(231,76,60,0.95); }

    .footerbar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 16px 16px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .small { font-size: 12px; color: var(--muted); }
    .select-inline { display: inline-flex; gap: 8px; align-items: center; }

    @media (max-width: 980px) {
      .card-inner { grid-template-columns: 1fr; }
      .video { border-right: none; border-bottom: 1px solid var(--border); }
      .controls { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>
  <div class="topbar">
    <div class="container">
      <div class="title">{{TITLE}}</div>

      <div class="controls" id="controls">
        <div class="control">
          <label>Dataset</label>
          <select id="datasetFilter"></select>
        </div>

        <!-- Injected experiment filters -->
        {{EXP_FILTERS}}

        <div class="control">
          <label>Search (question / options / id)</label>
          <input id="searchBox" type="text" placeholder="e.g., microwave, q001, Blue..." />
        </div>
      </div>

      <div class="row">
        <div class="leftrow">
          <label class="pill">
            <input type="checkbox" id="onlyDisagree" />
            Only disagreements
          </label>

          <button class="btn" id="resetBtn">Reset</button>

          <span class="pill" id="countPill">0 rows</span>
        </div>

        <div class="leftrow">
          <span class="select-inline">
            <span class="small">Sort</span>
            <select id="sortKey">
              <option value="__index">Original</option>
              <option value="dataset">Dataset</option>
              <option value="question_id">Question ID</option>
              {{SORT_EXP_OPTIONS}}
            </select>
            <select id="sortDir">
              <option value="asc">Asc</option>
              <option value="desc">Desc</option>
            </select>
          </span>

          <span class="select-inline">
            <span class="small">Page size</span>
            <select id="pageSize">
              <option>20</option>
              <option selected>50</option>
              <option>100</option>
            </select>
          </span>

          <button class="btn" id="prevBtn">Prev</button>
          <button class="btn" id="nextBtn">Next</button>
        </div>
      </div>
    </div>
  </div>

  <div class="cards" id="cards"></div>

  <div class="footerbar">
    <div class="small" id="pageInfo">Page 1</div>
    <div class="small">Tip: videos must be accessible from the machine opening this HTML.</div>
  </div>

  <script type="application/json" id="data-json">{{DATA_JSON}}</script>
  <script type="application/json" id="exp-cols-json">{{EXP_COLS_JSON}}</script>

  <script>
    const rows = JSON.parse(document.getElementById("data-json").textContent);
    const expCols = JSON.parse(document.getElementById("exp-cols-json").textContent);

    // Set CSS exp-cols for grid layout
    document.documentElement.style.setProperty("--exp-cols", expCols.length);

    const els = {
      datasetFilter: document.getElementById("datasetFilter"),
      searchBox: document.getElementById("searchBox"),
      onlyDisagree: document.getElementById("onlyDisagree"),
      resetBtn: document.getElementById("resetBtn"),
      countPill: document.getElementById("countPill"),
      cards: document.getElementById("cards"),
      sortKey: document.getElementById("sortKey"),
      sortDir: document.getElementById("sortDir"),
      pageSize: document.getElementById("pageSize"),
      prevBtn: document.getElementById("prevBtn"),
      nextBtn: document.getElementById("nextBtn"),
      pageInfo: document.getElementById("pageInfo"),
    };

    const expFilterEls = {};
    for (const c of expCols) {
      expFilterEls[c] = document.getElementById(`filter__${c}`);
    }

    function uniq(arr) {
      return Array.from(new Set(arr));
    }

    function getDisagree(row) {
      const vals = expCols.map(c => row[c]);
      const known = vals.filter(v => v === true || v === false);
      if (known.length <= 1) return false;
      return !known.every(v => v === known[0]);
    }

    function normalizeText(s) {
      return (s ?? "").toString().toLowerCase();
    }

    function applyFilters() {
      const ds = els.datasetFilter.value;
      const q = normalizeText(els.searchBox.value);
      const onlyDis = els.onlyDisagree.checked;

      const tri = {};
      for (const c of expCols) {
        const v = expFilterEls[c].value; // "all" | "true" | "false"
        tri[c] = v;
      }

      let out = rows;

      if (ds !== "__all__") {
        out = out.filter(r => r.dataset === ds);
      }

      if (q) {
        out = out.filter(r => {
          const blob = [
            r.question_id,
            r.question,
            r.options_raw,
            (r.options_list || []).join(" | ")
          ].map(normalizeText).join(" ");
          return blob.includes(q);
        });
      }

      for (const c of expCols) {
        const v = tri[c];
        if (v === "true") out = out.filter(r => r[c] === true);
        else if (v === "false") out = out.filter(r => r[c] === false);
      }

      if (onlyDis) {
        out = out.filter(r => getDisagree(r));
      }

      return out;
    }

    function compare(a, b, key) {
      if (key === "__index") return a.__index - b.__index;

      const va = a[key];
      const vb = b[key];

      // booleans: false < true < null
      if (typeof va === "boolean" || typeof vb === "boolean" || va === null || vb === null) {
        const rank = (v) => v === false ? 0 : (v === true ? 1 : 2);
        return rank(va) - rank(vb);
      }

      // strings / others
      return (va ?? "").toString().localeCompare((vb ?? "").toString(), undefined, {numeric: true});
    }

    function renderCard(row) {
      const optLis = (row.options_list || []).map((opt, i) => {
        const cls = (row.correct_index === i) ? "correct" : "";
        const safe = escapeHtml(opt);
        return `<li class="${cls}">${safe}</li>`;
      }).join("");

      const badges = expCols.map(c => {
        const v = row[c];
        const cls = (v === true) ? "badge good" : (v === false ? "badge bad" : "badge");
        const txt = (v === true) ? "True" : (v === false ? "False" : "NA");
        return `<span class="${cls}">${escapeHtml(c)}: ${txt}</span>`;
      }).join("");

      const videoHtml = row.video_path
        ? `<video controls preload="metadata" onerror="this.style.display='none'; this.parentElement.querySelector('.v-placeholder').style.display='block';">
             <source src="${escapeAttr(row.video_path)}" />
           </video>
           <div class="v-placeholder" style="display:none;">
             Video failed to load.<br/>
             <span class="muted">${escapeHtml(row.video_path)}</span>
           </div>`
        : `<div class="v-placeholder">No video_path provided.</div>`;

      const correctDisplay = row.correct_option ? escapeHtml(row.correct_option) : "—";

      return `
        <div class="card">
          <div class="card-inner">
            <div class="video">
              ${videoHtml}
            </div>
            <div class="content">
              <div class="meta">
                <strong>${escapeHtml(row.dataset)}</strong>
                <span class="muted">${escapeHtml(row.question_id)}</span>
              </div>

              <div class="question">${escapeHtml(row.question)}</div>

              <div class="muted small">Correct: <strong style="color: var(--text)">${correctDisplay}</strong></div>

              <ul class="options">
                ${optLis || `<li class="muted">No parsed options. Raw: ${escapeHtml(row.options_raw || "")}</li>`}
              </ul>

              <div class="badges">
                ${badges}
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function escapeHtml(s) {
      return (s ?? "").toString()
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttr(s) {
      // keep it simple; escape quotes and angle brackets
      return (s ?? "").toString()
        .replaceAll("&", "&amp;")
        .replaceAll('"', "&quot;")
        .replaceAll("<", "%3C")
        .replaceAll(">", "%3E");
    }

    // Pagination state
    let page = 1;

    function render() {
      const filtered = applyFilters();

      // sort
      const key = els.sortKey.value;
      const dir = els.sortDir.value;
      const sorted = filtered.slice().sort((a,b) => compare(a,b,key));
      if (dir === "desc") sorted.reverse();

      // pagination
      const ps = parseInt(els.pageSize.value, 10) || 50;
      const total = sorted.length;
      const totalPages = Math.max(1, Math.ceil(total / ps));
      page = Math.min(page, totalPages);
      page = Math.max(page, 1);

      const start = (page - 1) * ps;
      const end = Math.min(total, start + ps);
      const view = sorted.slice(start, end);

      els.countPill.textContent = `${total} rows`;
      els.pageInfo.textContent = `Page ${page} / ${totalPages} (showing ${start+1}-${end})`;

      els.cards.innerHTML = view.map(renderCard).join("");
    }

    function resetFilters() {
      els.datasetFilter.value = "__all__";
      els.searchBox.value = "";
      els.onlyDisagree.checked = false;
      for (const c of expCols) expFilterEls[c].value = "all";
      els.sortKey.value = "__index";
      els.sortDir.value = "asc";
      els.pageSize.value = "50";
      page = 1;
      render();
    }

    function init() {
      // dataset dropdown
      const dsets = uniq(rows.map(r => r.dataset)).sort((a,b) => a.localeCompare(b));
      els.datasetFilter.innerHTML = [`<option value="__all__">All</option>`]
        .concat(dsets.map(d => `<option value="${escapeAttr(d)}">${escapeHtml(d)}</option>`))
        .join("");

      // events
      els.datasetFilter.addEventListener("change", () => { page = 1; render(); });
      els.searchBox.addEventListener("input", () => { page = 1; render(); });
      els.onlyDisagree.addEventListener("change", () => { page = 1; render(); });

      for (const c of expCols) {
        expFilterEls[c].addEventListener("change", () => { page = 1; render(); });
      }

      els.sortKey.addEventListener("change", () => { page = 1; render(); });
      els.sortDir.addEventListener("change", () => { page = 1; render(); });
      els.pageSize.addEventListener("change", () => { page = 1; render(); });

      els.prevBtn.addEventListener("click", () => { page = Math.max(1, page - 1); render(); });
      els.nextBtn.addEventListener("click", () => { page = page + 1; render(); });

      els.resetBtn.addEventListener("click", resetFilters);

      resetFilters();
    }

    init();
  </script>
</body>
</html>
